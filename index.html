<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My First Website</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f4f4f4;
}

header{
    background:#333;
    color:white;
    text-align:center;
    padding:20px;
}

nav{
    background:#555;
    padding:10px;
    text-align:center;
}

nav a{
    color:white;
    margin:0 15px;
    text-decoration:none;
    font-weight:bold;
}

nav a:hover{
    text-decoration:underline;
}

.container{
    padding:20px;
}

footer{
    background:#333;
    color:white;
    text-align:center;
    padding:10px;
    position:fixed;
    bottom:0;
    width:100%;
}
</style>
</head>

<body>

<header>
<h1>Welcome to My Website</h1>
<p>This is my first website</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

<div class="container">
<h2>Home</h2>
<p>This is a simple website created using HTML and CSS.</p>

<h2>About</h2>
<p>You can add information about yourself here.</p>

<h2>Contact</h2>
<p>Email: example@email.com</p>
</div>

<footer>
<p>© 2026 My Website</p>
</footer>

</body>
</html>
